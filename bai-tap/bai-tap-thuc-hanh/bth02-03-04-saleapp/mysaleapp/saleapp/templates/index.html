<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trang chủ</title>
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <!--Câu chào mừng-->
    <h1 class="subject">Chào mừng bạn đã đến với website bán hàng trực tuyến</h1>

    <!--Nạp danh mục và danh sách sản phẩm-->
    <ul>
        <li>
            <a href="{{ url_for('product_list') }}">Tất cả sản phẩm</a>
        </li>

        {% for c in categories %}
        <li>
            <a href="{{ url_for('product_list', category_id=c.id) }}">{{ c.name }}</a>
        </li>
        {% endfor %}
    </ul>

</body>
</html>
